<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi-Flux</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-image: url('background.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .logo {
            text-align: center;
            margin: 30px 0 40px;
        }
        
        .logo img {
            max-width: 300px;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .welcome-text {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 30px;
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .welcome-text h2 {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .menu-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px 28px;
            margin: 12px 0;
            color: white;
            font-size: 22px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        
        .menu-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
        .menu-button:active {
            transform: translateY(0);
        }
        
        .menu-button .checkmark {
            margin-right: 16px;
            font-size: 26px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Логотип (картинка) -->
        <div class="logo">
            <img src="logo.png" alt="Digi-Flux">
        </div>
        
        <!-- Текст (увеличенный) -->
        <div class="welcome-text">
            <h2>Всё просто. Всё работает. Всё для вас!</h2>
        </div>
        
        <!-- Кнопки (без эмодзи, с галочками) -->
        <div class="menu-button" onclick="showPage('profile')">
            <span class="checkmark">✅</span>
            <span>Профиль</span>
        </div>
        
        <div class="menu-button" onclick="showPage('subscription')">
            <span class="checkmark">✅</span>
            <span>Подписка</span>
        </div>
        
        <div class="menu-button" onclick="showPage('invite')">
            <span class="checkmark">✅</span>
            <span>Пригласить</span>
        </div>
        
        <div class="menu-button" onclick="showPage('help')">
            <span class="checkmark">✅</span>
            <span>Помощь</span>
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        function showPage(page) {
            tg.showPopup({
                title: 'Раздел',
                message: 'Здесь будет: ' + page,
                buttons: [{type: 'ok'}]
            });
        }
        
        tg.setHeaderColor('#667eea');
        tg.setBackgroundColor('#667eea');
    </script>
</body>
</html>
