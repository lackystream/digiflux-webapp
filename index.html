<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi-Flux</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-image: url('background.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .logo {
            text-align: center;
            margin: 20px 0 30px;
        }
        
        .logo img {
            max-width: 250px;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .intro {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .intro h2 {
            font-size: 24px;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .menu-section {
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            opacity: 0.9;
            padding-left: 5px;
        }
        
        .menu-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 18px 24px;
            margin: 8px 0;
            color: white;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        
        .menu-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(5px);
        }
        
        .menu-button .checkmark {
            margin-right: 14px;
            font-size: 22px;
        }
        
        .menu-button .description {
            font-size: 13px;
            opacity: 0.8;
            margin-left: auto;
        }
        
        .start-here {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-top: 25px;
            text-align: center;
        }
        
        .start-here h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .start-here p {
            font-size: 14px;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Логотип -->
        <div class="logo">
            <img src="logo.png" alt="Digi-Flux">
        </div>
        
        <!-- Приветствие -->
        <div class="intro">
            <h2>Всё просто. Всё работает. Всё для вас!</h2>
        </div>
        
        <!-- Меню -->
        <div class="menu-section">
            <div class="section-title">📋 Основные разделы</div>
            
            <div class="menu-button" onclick="showPage('profile')">
                <span class="checkmark">✅</span>
                <span>Профиль</span>
                <span class="description">Ваш доступ</span>
            </div>
            
            <div class="menu-button" onclick="showPage('subscription')">
                <span class="checkmark">✅</span>
                <span>Подписка</span>
                <span class="description">Подключить</span>
            </div>
            
            <div class="menu-button" onclick="showPage('invite')">
                <span class="checkmark">✅</span>
                <span>Пригласить</span>
                <span class="description">Бонусы</span>
            </div>
            
            <div class="menu-button" onclick="showPage('help')">
                <span class="checkmark">✅</span>
                <span>Помощь</span>
                <span class="description">Инструкции</span>
            </div>
        </div>
        
        <!-- С чего начать (внизу) -->
        <div class="start-here">
            <h3>С чего начать?</h3>
            <p>Нажмите "Профиль" для просмотра вашего доступа или "Подписка" для подключения</p>
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        function showPage(page) {
            tg.showPopup({
                title: 'Раздел: ' + page,
                message: 'Здесь будет информация о разделе. Подключите к боту для полной функциональности.',
                buttons: [{type: 'ok'}]
            });
        }
        
        tg.setHeaderColor('#667eea');
        tg.setBackgroundColor('#667eea');
    </script>
</body>
</html>
