<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi-Flux</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-image: url('background.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .logo {
            text-align: center;
            margin: 30px 0 40px;
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .menu-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 18px 24px;
            margin: 12px 0;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        
        .menu-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
        .menu-button:active {
            transform: translateY(0);
        }
        
        .menu-button .emoji {
            margin-right: 12px;
            font-size: 24px;
        }
        
        .welcome-text {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌐 Digi-Flux</div>
        
        <div class="welcome-text">
            <h2>Добро пожаловать!</h2>
            <p style="margin-top: 14px; opacity: 0.9;">
                Всё просто. Всё работает. Всё для вас!
            </p>
        </div>
        
        <div class="menu-button" onclick="showPage('profile')">
            <span class="emoji">👤</span>
            <span>Профиль</span>
        </div>
        
        <div class="menu-button" onclick="showPage('subscription')">
            <span class="emoji">📋</span>
            <span>Подписка</span>
        </div>
        
        <div class="menu-button" onclick="showPage('invite')">
            <span class="emoji">👥</span>
            <span>Пригласить</span>
        </div>
        
        <div class="menu-button" onclick="showPage('help')">
            <span class="emoji">🆘</span>
            <span>Помощь</span>
        </div>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        function showPage(page) {
            tg.showPopup({
                title: 'Раздел',
                message: 'Здесь будет: ' + page,
                buttons: [{type: 'ok'}]
            });
        }
        
        tg.setHeaderColor('#667eea');
        tg.setBackgroundColor('#667eea');
    </script>
</body>
</html>
